<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Spaghettification</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/*
PHYSICS MODEL:
  - Newtonian gravity: F = GM/r^2, but clamped to avoid singularity.
  - Each particle has position (x,y), velocity (vx,vy), mass ignored (test particle).
  - Per-frame Euler integration: v += a*dt, p += v*dt.
  - Tidal stretching: the tangential vs radial velocity ratio drives elongation scale.
    Stretch factor = (EH_RADIUS / r)^2.5 clamped to [1, 40].
  - Glow intensity = EH_RADIUS / r, clamped [0,1].
  - Particles consumed at r < EH_RADIUS * 0.3 and recycled to the outer belt.

DATA STRUCTURES:
  - Particle pool: flat typed-array-friendly JS objects (no alloc in draw loop).
    { x, y, vx, vy, r (distance cache), angle, size, baseHue, life, phase }
  - Accretion disk: separate ring of disk segments (angle, radius, speed, alpha).
  - Lens flare ring: static precomputed arc list rendered each frame.

RENDER LOOP:
  1. Clear with semi-transparent black (motion blur trail).
  2. Draw background stars (static, drawn once to offscreen canvas).
  3. Draw accretion disk arcs with additive composite.
  4. For each particle: update physics → compute stretch/glow → draw elongated ellipse.
  5. Draw black hole core: gravitational lens ring + event horizon disk + corona.
  6. requestAnimationFrame loop, no setInterval.
*/

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = () => canvas.width;
const H = () => canvas.height;
const CX = () => canvas.width * 0.5;
const CY = () => canvas.height * 0.5;

const GM = 4e6;
const EH_RADIUS = 38;
const SPAWN_MIN = 220;
const SPAWN_MAX = 460;
const PARTICLE_COUNT = 180;
const DISK_SEGMENT_COUNT = 280;
const DT = 0.016;

let cx, cy, w, h;
let starCanvas, starCtx;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cx = canvas.width * 0.5;
  cy = canvas.height * 0.5;
  w = canvas.width;
  h = canvas.height;
  buildStarField();
}

function buildStarField() {
  starCanvas = document.createElement('canvas');
  starCanvas.width = w;
  starCanvas.height = h;
  starCtx = starCanvas.getContext('2d');
  starCtx.fillStyle = '#000';
  starCtx.fillRect(0, 0, w, h);
  const count = Math.floor(w * h / 1200);
  for (let i = 0; i < count; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const sr = Math.random() * 1.2 + 0.1;
    const alpha = Math.random() * 0.7 + 0.1;
    const hue = Math.random() * 60 + 190;
    starCtx.beginPath();
    starCtx.arc(sx, sy, sr, 0, Math.PI * 2);
    starCtx.fillStyle = `hsla(${hue},60%,90%,${alpha})`;
    starCtx.fill();
  }
}

const particles = [];
const diskSegs = [];

function spawnParticle(p) {
  const angle = Math.random() * Math.PI * 2;
  const dist = SPAWN_MIN + Math.random() * (SPAWN_MAX - SPAWN_MIN);
  p.x = cx + Math.cos(angle) * dist;
  p.y = cy + Math.sin(angle) * dist;
  const orbitalSpeed = Math.sqrt(GM / dist) * (0.7 + Math.random() * 0.5);
  const dir = Math.random() < 0.85 ? 1 : -1;
  p.vx = -Math.sin(angle) * orbitalSpeed * dir + (Math.random() - 0.5) * 40;
  p.vy =  Math.cos(angle) * orbitalSpeed * dir + (Math.random() - 0.5) * 40;
  p.size = 1.5 + Math.random() * 2.5;
  p.baseHue = Math.random() < 0.6 ? 220 + Math.random() * 60 : 260 + Math.random() * 40;
  p.trail = [];
}

function initParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = { x: 0, y: 0, vx: 0, vy: 0, size: 2, baseHue: 220, trail: [] };
    const spread = i / PARTICLE_COUNT;
    spawnParticle(p);
    const preSteps = Math.floor(spread * 300);
    for (let s = 0; s < preSteps; s++) {
      updateParticlePhysics(p, true);
    }
    particles.push(p);
  }
}

function initDiskSegs() {
  for (let i = 0; i < DISK_SEGMENT_COUNT; i++) {
    const angle = (i / DISK_SEGMENT_COUNT) * Math.PI * 2;
    const layer = Math.floor(Math.random() * 4);
    const radii = [48, 62, 80, 102];
    const speeds = [0.028, 0.020, 0.014, 0.009];
    diskSegs.push({
      angle: angle + (Math.random() - 0.5) * 0.15,
      radius: radii[layer] + (Math.random() - 0.5) * 8,
      speed: speeds[layer] * (0.85 + Math.random() * 0.3),
      alpha: 0.4 + Math.random() * 0.55,
      arcLen: 0.03 + Math.random() * 0.08,
      layer: layer,
      hue: layer === 0 ? 20 + Math.random() * 20
           : layer === 1 ? 30 + Math.random() * 30
           : layer === 2 ? 220 + Math.random() * 40
           : 260 + Math.random() * 50,
      width: [4, 3, 2.5, 2][layer]
    });
  }
}

function updateParticlePhysics(p, silent) {
  const dx = cx - p.x;
  const dy = cy - p.y;
  const r2 = dx * dx + dy * dy;
  const r = Math.sqrt(r2);
  const rClamped = Math.max(r, EH_RADIUS * 0.8);
  const aClamped = GM / (rClamped * rClamped);
  const ax = (dx / r) * aClamped;
  const ay = (dy / r) * aClamped;
  p.vx += ax * DT;
  p.vy += ay * DT;
  p.x += p.vx * DT;
  p.y += p.vy * DT;
  p._r = r;
  if (!silent) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 6) p.trail.shift();
  }
  if (r < EH_RADIUS * 0.28) {
    spawnParticle(p);
    p.trail = [];
  }
}

function hsl(h, s, l, a) {
  if (a === undefined) return `hsl(${h},${s}%,${l}%)`;
  return `hsla(${h},${s}%,${l}%,${a})`;
}

function drawDisk() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < diskSegs.length; i++) {
    const d = diskSegs[i];
    d.angle += d.speed * DT * 60;
    const brightness = d.layer < 2 ? 70 : 55;
    const sat = d.layer < 2 ? 100 : 80;
    ctx.beginPath();
    ctx.arc(cx, cy, d.radius, d.angle, d.angle + d.arcLen);
    ctx.strokeStyle = hsl(d.hue, sat, brightness, d.alpha);
    ctx.lineWidth = d.width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.restore();
}

function drawParticle(p) {
  const r = p._r || Math.hypot(p.x - cx, p.y - cy);
  const normDist = Math.max(r, 1);
  const proximity = Math.min(EH_RADIUS * 3.5 / normDist, 1.0);
  const stretchFactor = Math.min(Math.pow(EH_RADIUS * 2.2 / Math.max(normDist, EH_RADIUS * 0.5), 2.5), 38);
  const speed = Math.hypot(p.vx, p.vy);
  const motionAngle = Math.atan2(p.vy, p.vx);
  const hotness = Math.pow(proximity, 1.5);
  const hue = p.baseHue - hotness * (p.baseHue - 22);
  const sat = 80 + hotness * 20;
  const lit = 55 + hotness * 30;
  const alpha = 0.55 + proximity * 0.45;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(motionAngle);
  if (proximity > 0.15) {
    ctx.globalCompositeOperation = 'screen';
    const glowSize = p.size * (1 + stretchFactor * 0.5) * (1 + hotness * 2);
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize * 1.8);
    grd.addColorStop(0, hsl(hue, sat, lit + 20, alpha * 0.9));
    grd.addColorStop(0.4, hsl(hue, sat, lit, alpha * 0.5));
    grd.addColorStop(1, hsl(hue, sat, lit, 0));
    ctx.beginPath();
    ctx.ellipse(0, 0, glowSize * 1.8, glowSize * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'screen';
  const halfLen = p.size * Math.max(stretchFactor, 1) * 0.5;
  const halfWid = Math.max(p.size * 0.4, 0.4);
  ctx.beginPath();
  ctx.ellipse(0, 0, halfLen, halfWid, 0, 0, Math.PI * 2);
  ctx.fillStyle = hsl(hue, sat, lit + 10, alpha);
  ctx.fill();
  ctx.restore();
}

function drawBlackHole() {
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  const outerGlow = EH_RADIUS * 5.5;
  const lensGrd = ctx.createRadialGradient(cx, cy, EH_RADIUS * 0.9, cx, cy, outerGlow);
  lensGrd.addColorStop(0,   'rgba(255,160,40,0.0)');
  lensGrd.addColorStop(0.08,'rgba(255,160,40,0.35)');
  lensGrd.addColorStop(0.18,'rgba(180,80,255,0.22)');
  lensGrd.addColorStop(0.35,'rgba(60,120,255,0.12)');
  lensGrd.addColorStop(0.65,'rgba(30,60,180,0.04)');
  lensGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, outerGlow, 0, Math.PI * 2);
  ctx.fillStyle = lensGrd;
  ctx.fill();

  ctx.globalCompositeOperation = 'screen';
  for (let ring = 0; ring < 3; ring++) {
    const ringR = EH_RADIUS * (1.06 + ring * 0.18);
    const ringAlpha = [0.7, 0.4, 0.2][ring];
    const ringHue = [30, 280, 220][ring];
    const ringW = [3.5, 2, 1][ring];
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = hsl(ringHue, 100, 80, ringAlpha);
    ctx.lineWidth = ringW;
    ctx.stroke();
  }

  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath();
  ctx.arc(cx, cy, EH_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, EH_RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,180,60,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

let t = 0;
function drawCorona() {
  t += DT;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const spikes = 7;
  for (let i = 0; i < spikes; i++) {
    const a = (i / spikes) * Math.PI * 2 + t * 0.12 + (i % 2 === 0 ? Math.sin(t * 0.4 + i) * 0.15 : 0);
    const innerR = EH_RADIUS * 0.95;
    const outerR = EH_RADIUS * (1.6 + 0.35 * Math.sin(t * 0.7 + i * 1.3));
    const grd = ctx.createLinearGradient(
      cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR,
      cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR
    );
    grd.addColorStop(0, 'rgba(255,200,80,0.7)');
    grd.addColorStop(1, 'rgba(255,100,30,0.0)');
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a - 0.12) * innerR, cy + Math.sin(a - 0.12) * innerR);
    ctx.quadraticCurveTo(
      cx + Math.cos(a) * outerR * 0.9, cy + Math.sin(a) * outerR * 0.9,
      cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR
    );
    ctx.lineTo(cx + Math.cos(a + 0.12) * innerR, cy + Math.sin(a + 0.12) * innerR);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();
  }
  ctx.restore();
}

function frame() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.drawImage(starCanvas, 0, 0);
  ctx.fillStyle = 'rgba(0,0,2,0.38)';
  ctx.fillRect(0, 0, w, h);
  drawDisk();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < particles.length; i++) {
    updateParticlePhysics(particles[i], false);
    drawParticle(particles[i]);
  }
  ctx.globalCompositeOperation = 'source-over';
  drawCorona();
  drawBlackHole();
  requestAnimationFrame(frame);
}

resize();
initParticles();
initDiskSegs();
window.addEventListener('resize', () => { resize(); });
requestAnimationFrame(frame);
</script>
</body>
</html>
