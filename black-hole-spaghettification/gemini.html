<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Spaghettification Simulation</title>
<style>
body, html {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background-color: #000000;
}
canvas {
display: block;
width: 100%;
height: 100%;
}
</style>
</head>
<body>
<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let width, height, centerX, centerY;
    let maxRadius;

    // Physics Constants
    const G_MASS = 8000; 
    const EVENT_HORIZON = 25;
    const PHOTON_SPHERE = EVENT_HORIZON * 1.5;
    const NUM_PARTICLES = 3500;
    
    // Data Structure: Object Pool
    const particles = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2;
        centerY = height / 2;
        maxRadius = Math.hypot(centerX, centerY) * 1.2;
    }

    window.addEventListener('resize', resize);
    resize();

    // Initialization
    function spawnParticle(p = {}, forcedDistance = null) {
        // If forcedDistance is provided, spawn at that radius, else distribute randomly for initial frame
        const dist = forcedDistance !== null 
            ? forcedDistance 
            : Math.random() * maxRadius + PHOTON_SPHERE;
        
        const angle = Math.random() * Math.PI * 2;
        
        p.x = Math.cos(angle) * dist;
        p.y = Math.sin(angle) * dist;
        
        // Calculate orbital velocity: v = sqrt(GM/r)
        // Multiply by slightly less than 1 to ensure eventual decay (inward spiral)
        const orbitalV = Math.sqrt(G_MASS / dist) * 0.98;
        
        // Tangential vector (angle + 90 degrees)
        p.vx = Math.cos(angle + Math.PI / 2) * orbitalV;
        p.vy = Math.sin(angle + Math.PI / 2) * orbitalV;
        
        p.size = Math.random() * 1.5 + 0.5;
        p.baseAlpha = Math.random() * 0.5 + 0.2;
        
        return p;
    }

    // Populate initial pool
    for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(spawnParticle({}));
    }

    // Color mapper based on distance ratio
    // Outer: 30, 80, 255 (Cool Blue) -> Inner: 255, 120, 10 (Hot Orange/White)
    function getColor(ratio, alpha) {
        const r = Math.floor(30 + (255 - 30) * ratio);
        const g = Math.floor(80 + (160 - 80) * ratio); // Peaking around 160 for bright orange/yellow
        const b = Math.floor(255 - (255 - 10) * ratio);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderLoop() {
        // Motion Blur
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(5, 5, 8, 0.25)';
        ctx.fillRect(0, 0, width, height);

        // Additive blending for glowing plasma
        ctx.globalCompositeOperation = 'lighter';

        // Shift origin to center for physics math
        ctx.translate(centerX, centerY);

        for (let i = 0; i < NUM_PARTICLES; i++) {
            const p = particles[i];

            const distSq = p.x * p.x + p.y * p.y;
            const dist = Math.sqrt(distSq);

            // Event Horizon consumption -> Recycle
            if (dist <= EVENT_HORIZON) {
                spawnParticle(p, maxRadius);
                continue;
            }

            // Gravity: F = G*M/r^2
            const force = G_MASS / distSq;
            
            // Acceleration vector towards center (0,0)
            const ax = -(p.x / dist) * force;
            const ay = -(p.y / dist) * force;

            p.vx += ax;
            p.vy += ay;

            // Accretion drag: friction increases as particles get denser near the center
            const drag = 1 - (0.01 * (EVENT_HORIZON / dist));
            p.vx *= drag;
            p.vy *= drag;

            // Integration
            p.x += p.vx;
            p.y += p.vy;

            // Render specific logic: Spaghettification (Tidal Stretching)
            // Tidal force scales approx with 1/r^3. 
            const tidalForce = Math.pow(EVENT_HORIZON / dist, 3) * 150;
            const stretch = 1 + tidalForce;
            
            // Normalize distance for color mapping (0 = edge, 1 = event horizon)
            let heatRatio = 1 - (dist - EVENT_HORIZON) / (maxRadius * 0.4);
            heatRatio = Math.max(0, Math.min(1, heatRatio));
            
            // Brightness spikes aggressively near the photon sphere
            const proximityGlow = Math.max(1, 3 * Math.pow(heatRatio, 4));

            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            // Stretch tail backwards along velocity vector
            ctx.lineTo(p.x - p.vx * stretch, p.y - p.vy * stretch);
            
            ctx.strokeStyle = getColor(heatRatio, p.baseAlpha * proximityGlow);
            // Object thins out as it stretches
            ctx.lineWidth = Math.max(0.1, p.size / (1 + tidalForce * 0.5));
            ctx.stroke();
        }

        ctx.translate(-centerX, -centerY);

        // Draw Black Hole singularity and Photon Ring
        ctx.globalCompositeOperation = 'source-over';
        
        // Photon Ring Gradient
        const grad = ctx.createRadialGradient(centerX, centerY, EVENT_HORIZON, centerX, centerY, PHOTON_SPHERE * 3);
        grad.addColorStop(0, 'rgba(0, 0, 0, 1)');
        grad.addColorStop(0.05, 'rgba(255, 150, 50, 0.8)');
        grad.addColorStop(0.2, 'rgba(150, 50, 255, 0.2)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, PHOTON_SPHERE * 3, 0, Math.PI * 2);
        ctx.fill();

        // The Event Horizon (Pure Black)
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(centerX, centerY, EVENT_HORIZON, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(renderLoop);
    }

    // Kick off the rendering pipeline
    requestAnimationFrame(renderLoop);
</script>

</body>
</html>
